<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="تطبيق Esy Way - النقل الذكي">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Esy Way - الرئيسية</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- ملف التنسيق الرئيسي -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <style>
        /* تنسيقات خاصة بالصفحة الرئيسية */
        body {
            background: radial-gradient(circle at 30% 10%, #0a0a0a, #000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Tajawal', sans-serif;
            color: #fff;
            padding: 20px;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s;
        }
        .app-logo {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        .app-tagline {
            color: #ccc;
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }
        .role-selector {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2rem 0;
        }
        .role-card {
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #FFD700;
            border-radius: 60px;
            padding: 2rem 2.5rem;
            min-width: 180px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        .role-card:hover {
            transform: translateY(-8px);
            background: #FFD700;
            color: #000;
            box-shadow: 0 0 40px #FFD700;
        }
        .role-card i {
            font-size: 3.5rem;
            color: #FFD700;
            margin-bottom: 1rem;
        }
        .role-card:hover i {
            color: #000;
        }
        .role-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .role-card p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .features {
            display: flex;
            gap: 2rem;
            margin-top: 3rem;
        }
        .feature-item {
            text-align: center;
            color: #aaa;
        }
        .feature-item i {
            font-size: 2rem;
            color: #FFD700;
            margin-bottom: 0.5rem;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 500px) {
            .app-logo { font-size: 3rem; }
            .role-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- شعار التطبيق -->
    <div class="logo-container">
        <div class="app-logo">Esy Way</div>
        <div class="app-tagline">النقل الذكي بين المنيا ودمشير</div>
    </div>

    <!-- اختيار الدور -->
    <div class="role-selector">
        <div class="role-card" onclick="window.location.href='passenger.html'">
            <i class="fas fa-user"></i>
            <h2>راكب</h2>
            <p>اطلب رحلتك الآن</p>
        </div>
        <div class="role-card" onclick="window.location.href='driver.html'">
            <i class="fas fa-car"></i>
            <h2>سائق</h2>
            <p>انضم إلينا وابدأ العمل</p>
        </div>
    </div>

    <!-- مميزات سريعة -->
    <div class="features">
        <div class="feature-item">
            <i class="fas fa-bolt"></i>
            <div>توصيل فوري</div>
        </div>
        <div class="feature-item">
            <i class="fas fa-shield-alt"></i>
            <div>آمن وموثوق</div>
        </div>
        <div class="feature-item">
            <i class="fas fa-coins"></i>
            <div>أسعار تنافسية</div>
        </div>
    </div>
    <script src="support-widget.js"></script>

    <script>
        // التحقق من وجود جلسة وتوجيه تلقائي
        if (localStorage.getItem('loggedInPassenger')) {
            window.location.href = 'passenger.html';
        } else if (localStorage.getItem('loggedInDriver')) {
            const driver = JSON.parse(localStorage.getItem('loggedInDriver'));
            if (driver.status === 'accepted') {
                window.location.href = 'driver.html';
            } else {
                // إذا كان pending، نتركه في الصفحة الرئيسية
                console.log('حساب السائق قيد الانتظار');
            }
        }
    </script>

</body>
</html>
