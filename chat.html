<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="تطبيق Esy Way - المحادثة">
    <meta name="theme-color" content="#0a0a0a">
    <title>Esy Way - محادثة</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- ملف التنسيق الرئيسي -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* ===== تنسيقات خاصة بالشات ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Tajawal', sans-serif;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: 12px;
        }
        
        /* شريط الحالة */
        .status-bar {
            background: #1a1a1a;
            padding: 5px 15px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #aaa;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        
        /* هيدر المحادثة */
        .chat-header {
            background: #1a1a1a;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #FFD700;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .back-btn, .menu-btn, .sync-btn {
            background: none;
            border: none;
            color: #FFD700;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .back-btn:hover, .menu-btn:hover, .sync-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .user-avatar {
            width: 45px;
            height: 45px;
            background: #333;
            border-radius: 50%;
            border: 2px solid #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            background-size: cover;
        }
        .user-details h3 {
            font-size: 1.1rem;
            color: #fff;
        }
        .user-status {
            font-size: 0.75rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
        }
        #chatIdDisplay {
            font-size: 0.65rem;
            color: #888;
            margin-top: 2px;
        }
        
        /* منطقة الرسائل */
        .messages-container {
            flex: 1 1 0;
            min-height: 0;
            overflow-y: auto;
            padding: 15px 10px;
            background: #0e0e0e;
            background-image: radial-gradient(circle at 20% 30%, #1a1a1a 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
        }
        
        /* فقاعة الرسالة */
        .message-row {
            display: flex;
            margin-bottom: 8px;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .outgoing {
            justify-content: flex-start;  /* الراكب - يمين */
        }
        .incoming {
            justify-content: flex-end;    /* السائق - يسار */
        }
        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .outgoing .message-bubble {
            background: #FFD700;
            color: #000;
            border-top-left-radius: 4px;
        }
        .incoming .message-bubble {
            background: #2a2a2a;
            color: #fff;
            border-top-right-radius: 4px;
        }
        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .message-time {
            font-size: 0.6rem;
            opacity: 0.7;
            margin-top: 5px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .message-image {
            max-width: 220px;
            max-height: 220px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #FFD700;
            margin-bottom: 5px;
        }
        .message-audio {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .play-audio-btn {
            background: #FFD700;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: #000;
            font-size: 1rem;
            transition: 0.3s;
        }
        .play-audio-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #FFD700;
        }
        
        /* شريط الإدخال */
        .input-bar {
            background: #1a1a1a;
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #FFD700;
            flex-shrink: 0;
            margin-bottom: 4px;
        }
        .attach-btn {
            background: none;
            border: none;
            color: #FFD700;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .attach-btn:hover {
            color: #fff;
            transform: rotate(15deg);
        }
        .message-input-wrapper {
            flex: 1;
            background: #2a2a2a;
            border-radius: 30px;
            padding: 4px 18px;
            display: flex;
            align-items: center;
            border: 1px solid #444;
            transition: 0.3s;
        }
        .message-input-wrapper:focus-within {
            border-color: #FFD700;
            box-shadow: 0 0 8px rgba(255,215,0,0.3);
        }
        .message-input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            width: 100%;
            outline: none;
            padding: 12px 0;
        }
        .message-input::placeholder {
            color: #888;
        }
        .send-btn {
            background: #FFD700;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            color: #000;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #FFD700;
        }
        
        /* أزرار السائق */
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .action-icon {
            background: rgba(255,215,0,0.1);
            border: 1px solid #FFD700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFD700;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-icon:hover {
            background: #FFD700;
            color: #000;
        }
        
        /* استجابة */
        @media (max-width: 500px) {
            .message-bubble { max-width: 85%; }
            .send-btn { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>

<!-- شريط الحالة -->
<div class="status-bar">
    <span>4G</span>
    <span id="currentTime"></span>
    <span>🔋 100%</span>
</div>

<!-- هيدر المحادثة -->
<div class="chat-header">
    <div class="header-left">
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-right"></i></button>
        <div class="user-info" onclick="showUserProfile()">
            <div class="user-avatar" id="chatAvatar"><i class="fas fa-user-circle"></i></div>
            <div class="user-details">
                <h3 id="chatUserName">محادثة</h3>
                <div class="user-status"><span class="online-dot"></span> متصل الآن</div>
                <div id="chatIdDisplay">جاري التحميل...</div>
            </div>
        </div>
    </div>
    <div class="header-right">
        <div id="driverActions" class="action-buttons"></div>
        <button class="sync-btn" id="syncBtn" title="تحديث"><i class="fas fa-sync-alt"></i></button>
        <button class="menu-btn" id="reportBtn" title="إبلاغ"><i class="fas fa-flag"></i></button>
    </div>
</div>

<!-- منطقة الرسائل -->
<div class="messages-container" id="messagesContainer">
    <div id="messagesList" style="display:flex; flex-direction:column;"></div>
</div>

<!-- شريط الإدخال -->
<div class="input-bar">
    <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
    <div class="message-input-wrapper">
        <input type="text" class="message-input" id="messageInput" placeholder="اكتب رسالة..." autocomplete="off">
    </div>
    <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
</div>

<!-- حقول مخفية للملفات -->
<input type="file" id="imageInput" accept="image/*" style="display:none;">
<input type="file" id="audioInput" accept="audio/*" style="display:none;">

<script src="js/main.js"></script>
<script>
    (function() {
        "use strict";
        
        // ---------- قراءة المعاملات من الرابط ----------
        const urlParams = new URLSearchParams(window.location.search);
        let otherUserId = urlParams.get('with');
        const otherUserName = urlParams.get('name') || 'المستخدم';
        const orderId = urlParams.get('orderId');
        let passedChatId = urlParams.get('chatId');
        
        // ---------- تحديد المستخدم الحالي ----------
        let currentUser = null, currentUserId = null, userType = null;
        const passengerSession = localStorage.getItem('loggedInPassenger');
        const driverSession = localStorage.getItem('loggedInDriver');
        
        if (passengerSession) {
            currentUser = JSON.parse(passengerSession);
            currentUserId = currentUser.phone;
            userType = 'passenger';
        } else if (driverSession) {
            currentUser = JSON.parse(driverSession);
            currentUserId = currentUser.phone;
            userType = 'driver';
        } else {
            alert('الرجاء تسجيل الدخول أولاً');
            window.location.href = 'index.html';
            return;
        }
        
        // ---------- دوال تنظيف وتوليد chatId ----------
        function cleanPhone(p) {
            return String(p).replace(/\D/g, '');
        }
        
        function generateChatId(u1, u2) {
            let a = cleanPhone(u1);
            let b = cleanPhone(u2);
            if (!a || !b) return null;
            return a > b ? b + '_' + a : a + '_' + b;
        }
        
        const cleanedCurrent = cleanPhone(currentUserId);
        let cleanedOther = cleanPhone(otherUserId || localStorage.getItem('lastChatPartner') || '');
        
        if (!cleanedOther || cleanedOther === 'admin' || cleanedOther.length < 5) {
            alert('رقم الطرف الآخر غير معروف');
            window.location.href = userType === 'driver' ? 'driver.html' : 'passenger.html';
            return;
        }
        localStorage.setItem('lastChatPartner', cleanedOther);
        
        // تحديد chatId النهائي (نتجاهل الممرر ونعيد توليده)
        let finalChatId = generateChatId(cleanedCurrent, cleanedOther);
        console.log('🚀 chatId:', finalChatId);
        document.getElementById('chatIdDisplay').innerText = `ID: ${finalChatId}`;
        document.getElementById('chatUserName').innerText = otherUserName;
        
        // ---------- تحديث الوقت في شريط الحالة ----------
        function updateTime() {
            document.getElementById('currentTime').innerText = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        // ---------- دوال API ----------
        async function fetchMessagesFromAPI() {
            try {
                const res = await fetch(`${API_URL}?action=getMessages&chatId=${finalChatId}`);
                const data = await res.json();
                return data.messages || [];
            } catch(e) {
                console.error('فشل جلب الرسائل:', e);
                return [];
            }
        }
        
        async function sendMessageToAPI(text, type = 'text') {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: 'sendMessage',
                        chatId: finalChatId,
                        sender: cleanedCurrent,
                        text: text,
                        type: type,
                        timestamp: new Date().toISOString()
                    })
                });
                return true;
            } catch(e) {
                console.error('فشل الإرسال:', e);
                return false;
            }
        }
        
        // ---------- عرض الرسائل ----------
        function renderMessages(messages) {
            const container = document.getElementById('messagesList');
            container.innerHTML = '';
            if (!messages.length) {
                container.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">✨ لا توجد رسائل بعد</div>';
                return;
            }
            messages.forEach(msg => {
                const senderClean = cleanPhone(msg.sender);
                const isOutgoing = senderClean === cleanedCurrent;
                const row = document.createElement('div');
                row.className = `message-row ${isOutgoing ? 'outgoing' : 'incoming'}`;
                
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                
                const timeStr = new Date(msg.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                let content = '';
                
                if (msg.type === 'image') {
                    content = `<img src="${escapeHtml(msg.text)}" class="message-image" onclick="window.open('${escapeHtml(msg.text)}')">
                               <div class="message-time">${timeStr}</div>`;
                } else if (msg.type === 'audio') {
                    content = `<div class="message-audio">
                                  <button class="play-audio-btn" data-audio="${escapeHtml(msg.text)}"><i class="fas fa-play"></i></button>
                               </div><div class="message-time">${timeStr}</div>`;
                } else if (msg.type === 'arrival') {
                    content = `<div class="message-text"><i class="fas fa-map-marker-alt" style="color:#10b981;"></i> ${escapeHtml(msg.text)}</div>
                               <div class="message-time">${timeStr}</div>`;
                } else {
                    content = `<div class="message-text">${escapeHtml(msg.text)}</div>
                               <div class="message-time">${timeStr}</div>`;
                }
                
                bubble.innerHTML = content;
                row.appendChild(bubble);
                container.appendChild(row);
            });
            
            document.querySelector('.messages-container').scrollTop = document.querySelector('.messages-container').scrollHeight;
            
            document.querySelectorAll('.play-audio-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const audio = new Audio(btn.dataset.audio);
                    audio.play();
                });
            });
        }
        
        async function refreshMessages() {
            const messages = await fetchMessagesFromAPI();
            renderMessages(messages);
        }
        
        // ---------- إرسال رسالة ----------
        async function handleSendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            const sent = await sendMessageToAPI(text, 'text');
            if (sent) {
                await refreshMessages();
            } else {
                alert('فشل إرسال الرسالة');
            }
        }
        
        // ---------- إجراءات السائق ----------
        function setupDriverActions() {
            const container = document.getElementById('driverActions');
            if (userType !== 'driver') return;
            
            container.innerHTML = `
                <button class="action-icon" id="arrivedBtn" title="وصلت للموقع"><i class="fas fa-location-dot"></i></button>
                <button class="action-icon" id="endTripBtn" title="إنهاء المشوار"><i class="fas fa-flag-checkered"></i></button>
                <button class="action-icon" id="callBtn" title="اتصال"><i class="fas fa-phone-alt"></i></button>
            `;
            
            document.getElementById('arrivedBtn').addEventListener('click', async () => {
                await sendMessageToAPI('📍 السائق وصل إلى موقعك!', 'arrival');
                refreshMessages();
            });
            
            document.getElementById('endTripBtn').addEventListener('click', async () => {
                if (!confirm('هل أنهيت الرحلة؟')) return;
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'completeOrder', orderId: orderId })
                    });
                    alert('تم إنهاء الرحلة');
                    window.location.href = `rating.html?orderId=${orderId}&to=${cleanedOther}&name=${encodeURIComponent(otherUserName)}`;
                } catch(e) {
                    alert('خطأ في إنهاء الرحلة');
                }
            });
            
            document.getElementById('callBtn').addEventListener('click', () => {
                if (cleanedOther) window.open(`tel:${cleanedOther}`);
                else alert('لا يوجد رقم للاتصال');
            });
        }
        
        // ---------- رفع الملفات ----------
        function setupAttachments() {
            document.getElementById('attachBtn').addEventListener('click', () => {
                const choice = prompt('1 للصورة، 2 للتسجيل الصوتي');
                if (choice === '1') {
                    document.getElementById('imageInput').click();
                } else if (choice === '2') {
                    document.getElementById('audioInput').click();
                }
            });
            
            document.getElementById('imageInput').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await sendMessageToAPI(ev.target.result, 'image');
                    refreshMessages();
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            });
            
            document.getElementById('audioInput').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await sendMessageToAPI(ev.target.result, 'audio');
                    refreshMessages();
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            });
        }
        
        // ---------- أحداث عامة ----------
        document.getElementById('sendBtn').addEventListener('click', handleSendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSendMessage();
        });
        
        document.getElementById('syncBtn').addEventListener('click', refreshMessages);
        document.getElementById('reportBtn').addEventListener('click', () => {
            if (confirm('هل تريد الإبلاغ عن هذه المحادثة؟')) alert('تم الإبلاغ');
        });
        
        function escapeHtml(s) {
            return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        window.showUserProfile = function() {
            alert(`محادثة مع: ${otherUserName}\nالرقم: ${cleanedOther}`);
        };
        
        // ---------- بدء التشغيل ----------
        async function init() {
            // محاولة تحميل صورة الطرف الآخر
            try {
                const res = await fetch(`${API_URL}?action=getAllDrivers`);
                const data = await res.json();
                const driver = data.drivers?.find(d => cleanPhone(d.phone) === cleanedOther);
                if (driver && driver.image) {
                    document.getElementById('chatAvatar').style.backgroundImage = `url('${driver.image}')`;
                    document.getElementById('chatAvatar').innerHTML = '';
                }
            } catch(e) {}
            
            setupDriverActions();
            setupAttachments();
            await refreshMessages();
            setInterval(refreshMessages, 3000);
        }
        
        init();
        console.log('✨ chat.html جاهز');
    })();
</script>
</body>
</html>
