<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="تطبيق Esy Way - لوحة الراكب">
    <meta name="theme-color" content="#0a0a0a">
    <title>Esy Way - راكب</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- ملف التنسيق الرئيسي -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* ========== تنسيقات خاصة بصفحة الراكب ========== */
        body {
            background: radial-gradient(circle at 30% 20%, #0a0a0a, #000);
            font-family: 'Tajawal', sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .passenger-app {
            max-width: 750px;
            margin: 0 auto;
        }
        
        /* ===== حاوية المصادقة ===== */
        .auth-container {
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #FFD700;
            border-radius: 60px;
            padding: 35px 25px;
            margin: 30px 0;
            box-shadow: 0 0 40px rgba(255,215,0,0.2);
        }
        .auth-title {
            text-align: center;
            font-size: 2rem;
            color: #FFD700;
            margin-bottom: 25px;
        }
        .auth-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .auth-tab {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #FFD700;
            border-radius: 50px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .auth-tab.active {
            background: #FFD700;
            color: #000;
        }
        .auth-form.hidden {
            display: none;
        }
        
        /* ===== حقول الإدخال ===== */
        .input-group {
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            padding: 6px 20px 6px 50px;
            border: 2px solid #FFD700;
            margin-bottom: 20px;
            position: relative;
        }
        .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #FFD700;
            font-size: 1.2rem;
        }
        .input-group input,
        .input-group select {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 16px 0;
            width: 100%;
            outline: none;
        }
        .birth-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .birth-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }
        .btn {
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border: none;
            border-radius: 50px;
            padding: 16px;
            width: 100%;
            font-size: 1.3rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: 0.3s;
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin: -10px 20px 15px;
        }
        
        /* ===== لوحة التحكم ===== */
        .dashboard-container {
            display: none;
        }
        .dashboard-container.active {
            display: block;
        }
        .welcome-header {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 2px solid #FFD700;
            border-radius: 60px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
        }
        .app-greeting {
            font-size: 1.5rem;
            color: #FFD700;
        }
        .user-greeting {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
        }
        .stats-mini {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .stat-badge {
            background: #111;
            border: 1px solid #FFD700;
            border-radius: 40px;
            padding: 8px 20px;
        }
        
        /* ===== شبكة الخدمات ===== */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .service-card {
            background: #111;
            border: 2px solid #FFD700;
            border-radius: 50px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .service-card i {
            font-size: 2.5rem;
            color: #FFD700;
            margin-bottom: 10px;
        }
        
        /* ===== قائمة السائقين ===== */
        .drivers-section {
            background: rgba(0,0,0,0.5);
            border: 2px solid #FFD700;
            border-radius: 50px;
            padding: 20px;
            margin: 30px 0;
        }
        .driver-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1a1a1a;
            border-radius: 40px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #FFD700;
        }
        .driver-avatar {
            width: 60px;
            height: 60px;
            background: #333;
            border-radius: 30px;
            border: 2px solid #FFD700;
            background-size: cover;
        }
        .progress-bar {
            background: #333;
            height: 8px;
            border-radius: 10px;
            margin: 8px 0;
        }
        .progress-fill {
            height: 100%;
            background: #FFD700;
            border-radius: 10px;
        }
        
        /* ===== شريط التنقل ===== */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #111;
            border-top: 2px solid #FFD700;
            padding: 15px;
            border-radius: 50px;
            margin-top: 30px;
            position: sticky;
            bottom: 10px;
        }
        .nav-item {
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="passenger-app">
    
    <!-- ========== شاشة التسجيل / تسجيل الدخول ========== -->
    <div id="authSection" class="auth-container">
        <div class="auth-title">Esy Way</div>
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">تسجيل الدخول</div>
            <div class="auth-tab" data-tab="register">حساب جديد</div>
        </div>
        
        <!-- نموذج تسجيل الدخول -->
        <div id="loginForm" class="auth-form">
            <div class="input-group">
                <i class="fas fa-phone-alt"></i>
                <input type="tel" id="loginPhone" placeholder="رقم الهاتف" autocomplete="off">
            </div>
            <button class="btn" id="loginBtn">دخول</button>
            <p style="text-align:center; margin-top:15px; color:#aaa;">
                جديد هنا؟ <span style="color:#FFD700; cursor:pointer;" onclick="switchAuthTab('register')">أنشئ حساباً</span>
            </p>
        </div>
        
        <!-- نموذج إنشاء حساب جديد -->
        <div id="registerForm" class="auth-form hidden">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="regName" placeholder="الاسم الكامل" autocomplete="off">
            </div>
            <div class="input-group">
                <i class="fas fa-phone-alt"></i>
                <input type="tel" id="regPhone" placeholder="رقم الهاتف (11 رقم)" autocomplete="off">
            </div>
            <!-- تاريخ الميلاد (3 حقول منسدلة) -->
            <div class="birth-row">
                <div class="input-group">
                    <i class="fas fa-calendar-day"></i>
                    <select id="regDay">
                        <option value="">اليوم</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar-alt"></i>
                    <select id="regMonth">
                        <option value="">الشهر</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar"></i>
                    <select id="regYear">
                        <option value="">السنة</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <i class="fas fa-venus-mars"></i>
                <select id="regGender">
                    <option value="ذكر">ذكر</option>
                    <option value="أنثى">أنثى</option>
                </select>
            </div>
            <div id="regPhoneError" class="error-msg hidden"></div>
            <button class="btn" id="registerBtn">إنشاء حساب</button>
            <p style="text-align:center; margin-top:15px; color:#aaa;">
                لديك حساب؟ <span style="color:#FFD700; cursor:pointer;" onclick="switchAuthTab('login')">تسجيل الدخول</span>
            </p>
        </div>
    </div>
    
    <!-- ========== لوحة التحكم الرئيسية ========== -->
    <div id="dashboardSection" class="dashboard-container">
        <div class="welcome-header">
            <div class="app-greeting">مرحباً بك في Esy Way</div>
            <div class="user-greeting" id="userGreeting">مرحباً بك يا </div>
        </div>
        
        <div class="stats-mini">
            <div class="stat-badge"><span id="activeDriversCount">0</span> سائق نشط</div>
            <div class="stat-badge"><span id="myTripsCount">0</span> رحلة</div>
            <div class="stat-badge">⭐ <span id="myRating">0.0</span></div>
        </div>
        
        <div class="service-grid">
            <div class="service-card" onclick="alert('طلب خط: المنيا → دمشير')">
                <i class="fas fa-arrow-left"></i>
                <div>المنيا → دمشير</div>
            </div>
            <div class="service-card" onclick="alert('طلب خط: دمشير → المنيا')">
                <i class="fas fa-arrow-right"></i>
                <div>دمشير → المنيا</div>
            </div>
            <div class="service-card" onclick="window.location.href='chat.html?with=admin&name=دعم+Esy+Way'">
                <i class="fas fa-headset"></i>
                <div>الدعم الفني</div>
            </div>
            <div class="service-card" onclick="window.location.href='chat.html'">
                <i class="fas fa-comment"></i>
                <div>المحادثات</div>
            </div>
        </div>
        
        <div class="drivers-section">
            <h3 style="margin-bottom:20px;">🚗 السائقين النشطين</h3>
            <div id="driversList">جاري التحميل...</div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item" onclick="window.location.reload()"><i class="fas fa-home"></i></div>
            <div class="nav-item" onclick="alert('قيد التطوير')"><i class="fas fa-history"></i></div>
            <div class="nav-item" onclick="alert('قيد التطوير')"><i class="fas fa-heart"></i></div>
            <div class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></div>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    (function() {
        // ---------- عناصر DOM ----------
        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginPhone = document.getElementById('loginPhone');
        const loginBtn = document.getElementById('loginBtn');
        const regName = document.getElementById('regName');
        const regPhone = document.getElementById('regPhone');
        const regDay = document.getElementById('regDay');
        const regMonth = document.getElementById('regMonth');
        const regYear = document.getElementById('regYear');
        const regGender = document.getElementById('regGender');
        const registerBtn = document.getElementById('registerBtn');
        const regPhoneError = document.getElementById('regPhoneError');
        
        // ---------- ملء قوائم التاريخ ----------
        function populateDateSelects() {
            for (let i = 1; i <= 31; i++) regDay.innerHTML += `<option value="${i}">${i}</option>`;
            for (let i = 1; i <= 12; i++) regMonth.innerHTML += `<option value="${i}">${i}</option>`;
            const year = new Date().getFullYear();
            for (let i = year; i >= 1940; i--) regYear.innerHTML += `<option value="${i}">${i}</option>`;
        }
        populateDateSelects();
        
        // ---------- تبديل التبويبات ----------
        window.switchAuthTab = function(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.auth-tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
        };
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => switchAuthTab(tab.dataset.tab));
        });
        
        // ---------- التحقق من رقم الهاتف ----------
        function validatePhone(phone) {
            const clean = phone.replace(/\D/g, '');
            if (clean.length !== 11) return false;
            const prefix = clean.substring(0, 3);
            return ['010', '011', '012', '015'].includes(prefix);
        }
        
        // ---------- تسجيل الدخول ----------
        loginBtn.addEventListener('click', () => {
            const phone = loginPhone.value.trim();
            if (!validatePhone(phone)) {
                showToast('رقم الهاتف غير صحيح (يجب أن يبدأ بـ 010/011/012/015 ويتكون من 11 رقم)', 'error');
                return;
            }
            const clean = phone.replace(/\D/g, '');
            const passengers = JSON.parse(localStorage.getItem('allPassengers')) || [];
            const passenger = passengers.find(p => p.phone === clean);
            if (passenger) {
                localStorage.setItem('loggedInPassenger', JSON.stringify(passenger));
                showDashboard(passenger);
            } else {
                showToast('لم نتمكن من العثور على حساب بهذا الرقم', 'error');
            }
        });
        
        // ---------- إنشاء حساب جديد ----------
        registerBtn.addEventListener('click', async () => {
            const name = regName.value.trim();
            const phone = regPhone.value.trim();
            const day = regDay.value;
            const month = regMonth.value;
            const year = regYear.value;
            const gender = regGender.value;
            
            if (!name || !phone || !day || !month || !year) {
                showToast('جميع الحقول مطلوبة', 'warning');
                return;
            }
            if (!validatePhone(phone)) {
                regPhoneError.classList.remove('hidden');
                regPhoneError.innerText = 'رقم الهاتف يجب أن يبدأ بـ 010/011/012/015 ويتكون من 11 رقم';
                return;
            } else {
                regPhoneError.classList.add('hidden');
            }
            
            const cleanPhone = phone.replace(/\D/g, '');
            const passenger = {
                name,
                phone: cleanPhone,
                birth: `${day}/${month}/${year}`,
                gender,
                status: 'active'
            };
            
            // حفظ محلياً
            let allPass = JSON.parse(localStorage.getItem('allPassengers')) || [];
            const existing = allPass.find(p => p.phone === cleanPhone);
            if (!existing) allPass.push(passenger);
            else Object.assign(existing, passenger);
            localStorage.setItem('allPassengers', JSON.stringify(allPass));
            localStorage.setItem('loggedInPassenger', JSON.stringify(passenger));
            
            // إرسال للشيت
            if (typeof sendToSheet === 'function') {
                await sendToSheet('Passengers', passenger);
            }
            
            showToast('تم إنشاء الحساب بنجاح', 'success');
            showDashboard(passenger);
        });
        
        // ---------- عرض لوحة التحكم ----------
        function showDashboard(passenger) {
            authSection.classList.add('hidden');
            dashboardSection.classList.add('active');
            document.getElementById('userGreeting').innerText = `مرحباً بك يا ${passenger.name}`;
            loadDashboardData();
        }
        
        async function loadDashboardData() {
            // جلب السائقين النشطين
            if (typeof fetchActiveDrivers === 'function') {
                const drivers = await fetchActiveDrivers();
                renderDrivers(drivers);
            } else {
                document.getElementById('driversList').innerHTML = '<p>لا يوجد سائقين نشطين حالياً.</p>';
            }
            document.getElementById('activeDriversCount').innerText = '0';
        }
        
        function renderDrivers(drivers) {
            const container = document.getElementById('driversList');
            if (!drivers || !drivers.length) {
                container.innerHTML = '<p>لا يوجد سائقين نشطين حالياً.</p>';
                return;
            }
            let html = '';
            drivers.forEach(d => {
                html += `<div class="driver-item">
                    <div class="driver-avatar" style="background-image:url('${d.image || ''}')">${!d.image ? '🚗' : ''}</div>
                    <div style="flex:1">
                        <strong>${escapeHtml(d.name)}</strong> (${escapeHtml(d.carNum)})<br>
                        <small>${escapeHtml(d.currentState || 'في الموقف')}</small>
                        <div class="progress-bar"><div class="progress-fill" style="width:40%"></div></div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            document.getElementById('activeDriversCount').innerText = drivers.length;
        }
        
        // ---------- تسجيل الخروج ----------
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('loggedInPassenger');
            window.location.reload();
        });
        
        // ---------- التحقق من الجلسة عند التحميل ----------
        const passenger = JSON.parse(localStorage.getItem('loggedInPassenger'));
        if (passenger) {
            showDashboard(passenger);
        }
        
        function escapeHtml(s) { return String(s).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    })();
</script>
</body>
</html>
