<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Esy Way - لوحة الراكب - اطلب رحلتك بسهولة وأمان">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Esy Way | لوحة الراكب</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* ============================================
           Passenger Page Professional Styles
           ============================================ */
        
        :root {
            --primary-gold: #FFD700;
            --primary-orange: #FFA500;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(17, 17, 17, 0.95);
            --error: #ff4757;
            --success: #00d26a;
            --warning: #ffa502;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0a0a, #000000);
            font-family: 'Tajawal', sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .passenger-app {
            max-width: 750px;
            margin: 0 auto;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--primary-gold);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.95);
            color: var(--primary-gold);
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 500;
            z-index: 10000;
            transition: transform 0.3s;
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary-gold);
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .toast.error {
            border-color: var(--error);
            color: var(--error);
        }

        .toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Auth Container */
        .auth-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 2px solid var(--primary-gold);
            border-radius: 60px;
            padding: 35px 25px;
            margin: 30px 0;
            box-shadow: 0 0 40px rgba(255,215,0,0.2);
            animation: slideUp 0.5s ease-out;
        }

        .auth-title {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary-gold), var(--primary-orange));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .auth-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .auth-tab {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid var(--primary-gold);
            border-radius: 50px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
        }

        .auth-tab:hover {
            background: rgba(255,215,0,0.2);
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--primary-gold), var(--primary-orange));
            color: #000;
        }

        .auth-form.hidden {
            display: none;
        }

        /* Input Groups */
        .input-group {
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            padding: 6px 20px 6px 50px;
            border: 2px solid var(--primary-gold);
            margin-bottom: 20px;
            position: relative;
            transition: var(--transition);
        }

        .input-group:focus-within {
            border-color: var(--primary-orange);
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-gold);
            font-size: 1.2rem;
        }

        .input-group input,
        .input-group select {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            padding: 16px 0;
            width: 100%;
            outline: none;
            font-family: inherit;
        }

        .input-group select option {
            background: #1a1a1a;
            color: #fff;
        }

        .birth-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .birth-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(145deg, var(--primary-gold), var(--primary-orange));
            border: none;
            border-radius: 50px;
            padding: 16px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: var(--error);
            font-size: 0.8rem;
            margin: -10px 20px 15px;
        }

        /* Dashboard */
        .dashboard-container {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .dashboard-container.active {
            display: block;
        }

        .welcome-header {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 2px solid var(--primary-gold);
            border-radius: 60px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
        }

        .app-greeting {
            font-size: 1.2rem;
            color: var(--primary-gold);
        }

        .user-greeting {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 10px;
            background: linear-gradient(135deg, #fff, var(--primary-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stats-mini {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-badge {
            background: #111;
            border: 1px solid var(--primary-gold);
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 500;
        }

        /* Service Grid */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .service-card {
            background: #111;
            border: 2px solid var(--primary-gold);
            border-radius: 50px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .service-card:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            box-shadow: 0 10px 30px rgba(255,215,0,0.2);
        }

        .service-card i {
            font-size: 2.5rem;
            color: var(--primary-gold);
            margin-bottom: 10px;
        }

        /* Drivers Section */
        .drivers-section {
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--primary-gold);
            border-radius: 50px;
            padding: 20px;
            margin: 30px 0;
        }

        .driver-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1a1a1a;
            border-radius: 40px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--primary-gold);
            transition: var(--transition);
        }

        .driver-item:hover {
            transform: translateX(-5px);
            border-color: var(--primary-orange);
        }

        .driver-avatar {
            width: 60px;
            height: 60px;
            background: #333;
            border-radius: 30px;
            border: 2px solid var(--primary-gold);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .progress-bar {
            background: #333;
            height: 8px;
            border-radius: 10px;
            margin: 8px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-gold), var(--primary-orange));
            border-radius: 10px;
            transition: width 0.5s;
        }

        /* Bottom Navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #111;
            border-top: 2px solid var(--primary-gold);
            padding: 15px;
            border-radius: 50px;
            margin-top: 30px;
            position: sticky;
            bottom: 10px;
        }

        .nav-item {
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            padding: 8px;
            border-radius: 50%;
        }

        .nav-item:hover {
            color: var(--primary-gold);
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .service-grid { gap: 12px; }
            .service-card { padding: 18px 12px; }
            .service-card i { font-size: 1.8rem; }
            .user-greeting { font-size: 1.3rem; }
            .stat-badge { font-size: 0.8rem; }
            .toast { white-space: normal; text-align: center; max-width: 90%; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<div class="passenger-app">
    
    <!-- Auth Section -->
    <div id="authSection" class="auth-container">
        <div class="auth-title">🚀 Esy Way</div>
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">📱 تسجيل الدخول</div>
            <div class="auth-tab" data-tab="register">✨ حساب جديد</div>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm" class="auth-form">
            <div class="input-group">
                <i class="fas fa-phone-alt"></i>
                <input type="tel" id="loginPhone" placeholder="رقم الهاتف" autocomplete="off" inputmode="numeric">
            </div>
            <button class="btn" id="loginBtn">🚪 دخول</button>
            <p style="text-align:center; margin-top:15px; color:#aaa;">
                جديد هنا؟ <span style="color:#FFD700; cursor:pointer;" onclick="switchAuthTab('register')">أنشئ حساباً</span>
            </p>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" class="auth-form hidden">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="regName" placeholder="الاسم الكامل" autocomplete="off">
            </div>
            <div class="input-group">
                <i class="fas fa-phone-alt"></i>
                <input type="tel" id="regPhone" placeholder="رقم الهاتف (11 رقم)" autocomplete="off" inputmode="numeric">
            </div>
            <div class="birth-row">
                <div class="input-group">
                    <i class="fas fa-calendar-day"></i>
                    <select id="regDay"><option value="">اليوم</option></select>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar-alt"></i>
                    <select id="regMonth"><option value="">الشهر</option></select>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar"></i>
                    <select id="regYear"><option value="">السنة</option></select>
                </div>
            </div>
            <div class="input-group">
                <i class="fas fa-venus-mars"></i>
                <select id="regGender">
                    <option value="ذكر">👨 ذكر</option>
                    <option value="أنثى">👩 أنثى</option>
                </select>
            </div>
            <div id="regPhoneError" class="error-msg hidden"></div>
            <button class="btn" id="registerBtn">✅ إنشاء حساب</button>
            <p style="text-align:center; margin-top:15px; color:#aaa;">
                لديك حساب؟ <span style="color:#FFD700; cursor:pointer;" onclick="switchAuthTab('login')">تسجيل الدخول</span>
            </p>
        </div>
    </div>
    
    <!-- Dashboard Section -->
    <div id="dashboardSection" class="dashboard-container">
        <div class="welcome-header">
            <div class="app-greeting">🌟 مرحباً بك في Esy Way</div>
            <div class="user-greeting" id="userGreeting">مرحباً بك</div>
        </div>
        
        <div class="stats-mini">
            <div class="stat-badge"><i class="fas fa-car"></i> <span id="activeDriversCount">0</span> سائق نشط</div>
            <div class="stat-badge"><i class="fas fa-road"></i> <span id="myTripsCount">0</span> رحلة</div>
            <div class="stat-badge"><i class="fas fa-star"></i> <span id="myRating">0.0</span></div>
        </div>
        
        <div class="service-grid">
            <div class="service-card" data-trip="menia-demshier">
                <i class="fas fa-arrow-left"></i>
                <div>🚐 المنيا → دمشير</div>
                <small style="color:#aaa;">20 جنيه</small>
            </div>
            <div class="service-card" data-trip="demshier-menia">
                <i class="fas fa-arrow-right"></i>
                <div>🚐 دمشير → المنيا</div>
                <small style="color:#aaa;">20 جنيه</small>
            </div>
            <div class="service-card" data-action="support">
                <i class="fas fa-headset"></i>
                <div>📞 الدعم الفني</div>
            </div>
            <div class="service-card" data-action="chat">
                <i class="fas fa-comment"></i>
                <div>💬 المحادثات</div>
            </div>
        </div>
        
        <div class="drivers-section">
            <h3 style="margin-bottom:20px;"><i class="fas fa-users"></i> 🚗 السائقين النشطين</h3>
            <div id="driversList">
                <div style="text-align:center; padding:20px;">
                    <i class="fas fa-spinner fa-spin"></i> جاري التحميل...
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item" data-nav="home"><i class="fas fa-home"></i></div>
            <div class="nav-item" data-nav="history"><i class="fas fa-history"></i></div>
            <div class="nav-item" data-nav="favorites"><i class="fas fa-heart"></i></div>
            <div class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ============================================
    // Esy Way Passenger Module - Professional Version
    // ============================================
    
    (function() {
        'use strict';
        
        // ========== CONFIGURATION ==========
        const CONFIG = {
            storageKeys: {
                passengers: 'esyway_passengers',
                loggedPassenger: 'esyway_logged_passenger',
                drivers: 'esyway_drivers'
            },
            phonePrefixes: ['010', '011', '012', '015'],
            tripPrices: {
                'menia-demshier': 20,
                'demshier-menia': 20
            }
        };
        
        // ========== DOM Elements ==========
        const elements = {
            loadingOverlay: document.getElementById('loadingOverlay'),
            toast: document.getElementById('toast'),
            authSection: document.getElementById('authSection'),
            dashboardSection: document.getElementById('dashboardSection'),
            loginPhone: document.getElementById('loginPhone'),
            loginBtn: document.getElementById('loginBtn'),
            regName: document.getElementById('regName'),
            regPhone: document.getElementById('regPhone'),
            regDay: document.getElementById('regDay'),
            regMonth: document.getElementById('regMonth'),
            regYear: document.getElementById('regYear'),
            regGender: document.getElementById('regGender'),
            registerBtn: document.getElementById('registerBtn'),
            regPhoneError: document.getElementById('regPhoneError'),
            userGreeting: document.getElementById('userGreeting'),
            activeDriversCount: document.getElementById('activeDriversCount'),
            myTripsCount: document.getElementById('myTripsCount'),
            myRating: document.getElementById('myRating'),
            driversList: document.getElementById('driversList'),
            logoutBtn: document.getElementById('logoutBtn')
        };
        
        // ========== Helper Functions ==========
        const showLoading = (show) => {
            if (show) {
                elements.loadingOverlay.classList.add('active');
            } else {
                elements.loadingOverlay.classList.remove('active');
            }
        };
        
        const showToast = (message, type = 'info') => {
            const toast = elements.toast;
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        };
        
        const escapeHtml = (str) => {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        };
        
        const validatePhone = (phone) => {
            const clean = phone.replace(/\D/g, '');
            if (clean.length !== 11) return false;
            const prefix = clean.substring(0, 3);
            return CONFIG.phonePrefixes.includes(prefix);
        };
        
        const formatPhone = (phone) => {
            return phone.replace(/\D/g, '');
        };
        
        // ========== Storage Functions ==========
        const getPassengers = () => {
            const data = localStorage.getItem(CONFIG.storageKeys.passengers);
            return data ? JSON.parse(data) : [];
        };
        
        const savePassengers = (passengers) => {
            localStorage.setItem(CONFIG.storageKeys.passengers, JSON.stringify(passengers));
        };
        
        const getLoggedPassenger = () => {
            const data = localStorage.getItem(CONFIG.storageKeys.loggedPassenger);
            return data ? JSON.parse(data) : null;
        };
        
        const setLoggedPassenger = (passenger) => {
            localStorage.setItem(CONFIG.storageKeys.loggedPassenger, JSON.stringify(passenger));
        };
        
        const clearLoggedPassenger = () => {
            localStorage.removeItem(CONFIG.storageKeys.loggedPassenger);
        };
        
        // ========== Date Helpers ==========
        const populateDateSelects = () => {
            // Days
            for (let i = 1; i <= 31; i++) {
                elements.regDay.innerHTML += `<option value="${i}">${i}</option>`;
            }
            // Months
            const months = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 
                           'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
            for (let i = 0; i < months.length; i++) {
                elements.regMonth.innerHTML += `<option value="${i+1}">${months[i]}</option>`;
            }
            // Years
            const currentYear = new Date().getFullYear();
            for (let i = currentYear; i >= 1940; i--) {
                elements.regYear.innerHTML += `<option value="${i}">${i}</option>`;
            }
        };
        
        // ========== Auth Functions ==========
        window.switchAuthTab = (tab) => {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.auth-tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
        };
        
        const handleLogin = () => {
            const phone = elements.loginPhone.value.trim();
            
            if (!validatePhone(phone)) {
                showToast('رقم الهاتف غير صحيح. يجب أن يبدأ بـ 010, 011, 012, 015 ويتكون من 11 رقم', 'error');
                return;
            }
            
            const cleanPhone = formatPhone(phone);
            const passengers = getPassengers();
            const passenger = passengers.find(p => p.phone === cleanPhone);
            
            if (passenger) {
                setLoggedPassenger(passenger);
                showToast(`مرحباً بعودتك ${passenger.name}!`, 'success');
                showDashboard(passenger);
            } else {
                showToast('لم نتمكن من العثور على حساب بهذا الرقم', 'error');
            }
        };
        
        const handleRegister = async () => {
            const name = elements.regName.value.trim();
            const phone = elements.regPhone.value.trim();
            const day = elements.regDay.value;
            const month = elements.regMonth.value;
            const year = elements.regYear.value;
            const gender = elements.regGender.value;
            
            // Validation
            if (!name || !phone || !day || !month || !year) {
                showToast('جميع الحقول مطلوبة', 'warning');
                return;
            }
            
            if (name.length < 3) {
                showToast('الاسم يجب أن يكون 3 أحرف على الأقل', 'warning');
                return;
            }
            
            if (!validatePhone(phone)) {
                elements.regPhoneError.classList.remove('hidden');
                elements.regPhoneError.innerText = 'رقم الهاتف يجب أن يبدأ بـ 010/011/012/015 ويتكون من 11 رقم';
                return;
            } else {
                elements.regPhoneError.classList.add('hidden');
            }
            
            const cleanPhone = formatPhone(phone);
            const passengers = getPassengers();
            const existing = passengers.find(p => p.phone === cleanPhone);
            
            if (existing) {
                showToast('هذا الرقم مسجل مسبقاً. الرجاء تسجيل الدخول', 'warning');
                return;
            }
            
            // Create new passenger
            const newPassenger = {
                id: Date.now().toString(),
                name: escapeHtml(name),
                phone: cleanPhone,
                birth: `${day}/${month}/${year}`,
                gender: gender,
                status: 'active',
                registeredAt: new Date().toISOString(),
                trips: [],
                rating: 5.0,
                totalTrips: 0
            };
            
            passengers.push(newPassenger);
            savePassengers(passengers);
            setLoggedPassenger(newPassenger);
            
            showToast('تم إنشاء الحساب بنجاح! 🎉', 'success');
            showDashboard(newPassenger);
            
            // Optional: Send to Google Sheets if available
            if (typeof window.sendToSheet === 'function') {
                await window.sendToSheet('Passengers', newPassenger);
            }
        };
        
        // ========== Dashboard Functions ==========
        const showDashboard = (passenger) => {
            elements.authSection.classList.add('hidden');
            elements.dashboardSection.classList.add('active');
            elements.userGreeting.innerHTML = `مرحباً ${escapeHtml(passenger.name)} ✨`;
            elements.myTripsCount.innerText = passenger.totalTrips || 0;
            elements.myRating.innerText = (passenger.rating || 5.0).toFixed(1);
            
            loadDrivers();
        };
        
        const loadDrivers = async () => {
            showLoading(true);
            
            // Simulate API call - Replace with actual backend
            setTimeout(() => {
                const drivers = getMockDrivers();
                renderDrivers(drivers);
                showLoading(false);
            }, 800);
        };
        
        const getMockDrivers = () => {
            // Mock data - replace with real API
            const stored = localStorage.getItem(CONFIG.storageKeys.drivers);
            if (stored) return JSON.parse(stored);
            
            return [
                { id: 1, name: 'أحمد محمد', carNum: 'س ص ط 123', carModel: 'Hyundai', currentState: 'في الموقف', rating: 4.8, image: '' },
                { id: 2, name: 'محمود علي', carNum: 'ع ب ج 456', carModel: 'Toyota', currentState: 'متجه للمنيا', rating: 4.5, image: '' },
                { id: 3, name: 'خالد حسن', carNum: 'د ه و 789', carModel: 'Kia', currentState: 'في الموقف', rating: 4.9, image: '' }
            ];
        };
        
        const renderDrivers = (drivers) => {
            if (!drivers || drivers.length === 0) {
                elements.driversList.innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <i class="fas fa-car-side"></i>
                        <p>لا يوجد سائقين نشطين حالياً</p>
                    </div>
                `;
                elements.activeDriversCount.innerText = '0';
                return;
            }
            
            let html = '';
            drivers.forEach(driver => {
                const ratingPercent = (driver.rating / 5) * 100;
                html += `
                    <div class="driver-item">
                        <div class="driver-avatar">
                            ${driver.image ? `<img src="${escapeHtml(driver.image)}" style="width:100%;height:100%;border-radius:30px;object-fit:cover;">` : '🚗'}
                        </div>
                        <div style="flex:1">
                            <strong>${escapeHtml(driver.name)}</strong>
                            <div style="font-size:0.8rem; color:#aaa;">${escapeHtml(driver.carNum)} | ${escapeHtml(driver.carModel)}</div>
                            <div style="font-size:0.8rem;"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(driver.currentState)}</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width:${ratingPercent}%"></div>
                            </div>
                            <div style="font-size:0.75rem;"><i class="fas fa-star" style="color:#FFD700;"></i> ${driver.rating}</div>
                        </div>
                    </div>
                `;
            });
            
            elements.driversList.innerHTML = html;
            elements.activeDriversCount.innerText = drivers.length;
        };
        
        // ========== Trip Request ==========
        const requestTrip = (tripType) => {
            const passenger = getLoggedPassenger();
            if (!passenger) return;
            
            const price = CONFIG.tripPrices[tripType];
            const tripName = tripType === 'menia-demshier' ? 'المنيا → دمشير' : 'دمشير → المنيا';
            
            if (confirm(`تأكيد طلب رحلة: ${tripName}\nالسعر: ${price} جنيه\nسيتم إشعارك عند قبول الطلب`)) {
                showToast(`جاري البحث عن سائق لرحلة ${tripName}...`, 'info');
                
                // Simulate trip request
                setTimeout(() => {
                    showToast(`تم العثور على سائق! سيتم إشعارك قريباً`, 'success');
                    
                    // Update passenger trips
                    const passengers = getPassengers();
                    const index = passengers.findIndex(p => p.id === passenger.id);
                    if (index !== -1) {
                        passengers[index].totalTrips = (passengers[index].totalTrips || 0) + 1;
                        savePassengers(passengers);
                        elements.myTripsCount.innerText = passengers[index].totalTrips;
                    }
                }, 2000);
            }
        };
        
        // ========== Logout ==========
        const handleLogout = () => {
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                clearLoggedPassenger();
                showToast('تم تسجيل الخروج بنجاح', 'success');
                setTimeout(() => {
                    window.location.reload();
                }, 500);
            }
        };
        
        // ========== Event Listeners ==========
        const initEventListeners = () => {
            elements.loginBtn.addEventListener('click', handleLogin);
            elements.registerBtn.addEventListener('click', handleRegister);
            elements.logoutBtn.addEventListener('click', handleLogout);
            
            // Enter key for login
            elements.loginPhone.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
            
            // Service cards
            document.querySelectorAll('.service-card[data-trip]').forEach(card => {
                card.addEventListener('click', () => {
                    const trip = card.getAttribute('data-trip');
                    requestTrip(trip);
                });
            });
            
            document.querySelectorAll('.service-card[data-action]').forEach(card => {
                card.addEventListener('click', () => {
                    const action = card.getAttribute('data-action');
                    if (action === 'support') {
                        showToast('سيتم التواصل مع الدعم الفني قريباً', 'info');
                    } else if (action === 'chat') {
                        showToast('قريباً - خدمة المحادثات', 'info');
                    }
                });
            });
            
            // Bottom navigation
            document.querySelectorAll('.nav-item[data-nav]').forEach(nav => {
                nav.addEventListener('click', (e) => {
                    const navType = nav.getAttribute('data-nav');
                    if (navType === 'history') {
                        showToast('قيد التطوير - سجل الرحلات', 'info');
                    } else if (navType === 'favorites') {
                        showToast('قيد التطوير - المفضلة', 'info');
                    } else if (navType === 'home') {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            });
        };
        
        // ========== Check Session ==========
        const checkSession = () => {
            const passenger = getLoggedPassenger();
            if (passenger) {
                showDashboard(passenger);
            }
        };
        
        // ========== Initialize App ==========
        const init = () => {
            populateDateSelects();
            initEventListeners();
            checkSession();
            
            // Add CSS transition for body
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s';
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        };
        
        // Start the app
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
